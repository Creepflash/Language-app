<!DOCTYPE html>
<html lang="et" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tund</title>
    <style>
        :root {
            --bg: #11181d;
            --panel: #1a252d;
            --text: #f5f7fb;
            --muted: #9fb0bd;
            --ok: #7ad400;
            --warn: #ff8b6a;
            --border: 1px solid rgba(255,255,255,.1);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, #16222a 0%, var(--bg) 55%);
            color: var(--text);
            font-family: Inter, system-ui, sans-serif;
            display: grid;
            place-items: center;
            padding: 20px;
        }
        .shell {
            width: min(760px, 100%);
            background: var(--panel);
            border: var(--border);
            border-radius: 22px;
            padding: 24px;
        }
        h1 { margin: 0 0 10px; }
        p { margin: 0; color: var(--muted); }
        .meta {
            margin-top: 14px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }
        .question {
            margin-top: 20px;
            background: rgba(255,255,255,.03);
            border: var(--border);
            border-radius: 18px;
            padding: 18px;
        }
        .question-title { margin: 0 0 14px; font-size: 22px; line-height: 1.3; }
        .answers { display: grid; gap: 10px; }
        .option-btn {
            text-align: left;
            border: var(--border);
            border-radius: 12px;
            background: rgba(255,255,255,.04);
            color: var(--text);
            padding: 12px;
            cursor: pointer;
            font-weight: 700;
        }
        .option-btn.selected {
            border-color: rgba(122,212,0,.7);
            background: rgba(122,212,0,.14);
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: var(--border);
            background: rgba(255,255,255,.05);
            color: var(--text);
            font-size: 16px;
        }
        .feedback {
            margin-top: 12px;
            font-weight: 800;
            min-height: 22px;
        }
        .feedback.ok { color: var(--ok); }
        .feedback.bad { color: var(--warn); }
        .actions {
            margin-top: 16px;
            display: flex;
            gap: 12px;
        }
        .btn {
            border: none;
            border-radius: 12px;
            padding: 11px 16px;
            font-weight: 900;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-next { background: #ffe66b; color: #222; }
        .btn-secondary { background: rgba(255,255,255,.08); color: var(--text); border: var(--border); }
        .hidden { display: none; }
        .done-card {
            margin-top: 20px;
            border: 1px solid rgba(122,212,0,.45);
            border-radius: 18px;
            background: rgba(122,212,0,.11);
            padding: 18px;
        }
    </style>
</head>
<body>
<main class="shell">
    <a href="/learn" class="btn btn-secondary">Tagasi tundide juurde</a>
    <h1 id="lesson-title">Laadin tundi…</h1>
    <p id="lesson-description"></p>

    <div class="meta">
        <strong id="progress-text">Küsimus 0/0</strong>
        <strong id="score-text">Tulemus: 0</strong>
    </div>

    <section id="question-card" class="question hidden">
        <h2 id="question-title" class="question-title"></h2>
        <div id="answers" class="answers"></div>
        <div id="feedback" class="feedback"></div>
        <div class="actions">
            <button id="next-btn" class="btn btn-next">Kontrolli</button>
        </div>
    </section>

    <section id="done-card" class="done-card hidden">
        <h2>Tund on lõpetatud!</h2>
        <p id="final-score"></p>
        <div class="actions">
            <a id="next-lesson-link" class="btn btn-next hidden">Järgmine tund</a>
            <a href="/learn" class="btn btn-secondary">Tagasi tundide juurde</a>
        </div>
    </section>
</main>

<script th:inline="javascript">
    const lessonId = Number([[${lessonId}]]);
    const csrfToken = /*[[${_csrf.token}]]*/ "";
    const csrfHeader = /*[[${_csrf.headerName}]]*/ "X-CSRF-TOKEN";

    const lessonTitleEl = document.getElementById("lesson-title");
    const lessonDescriptionEl = document.getElementById("lesson-description");
    const questionCardEl = document.getElementById("question-card");
    const questionTitleEl = document.getElementById("question-title");
    const answersEl = document.getElementById("answers");
    const feedbackEl = document.getElementById("feedback");
    const progressTextEl = document.getElementById("progress-text");
    const scoreTextEl = document.getElementById("score-text");
    const doneCardEl = document.getElementById("done-card");
    const finalScoreEl = document.getElementById("final-score");
    const nextLessonLinkEl = document.getElementById("next-lesson-link");
    const nextBtnEl = document.getElementById("next-btn");

    let lesson = null;
    let exercises = [];
    let currentIndex = 0;
    let selectedAnswer = "";
    let lessonCompleted = false;
    let score = 0;
    let totalExercises = 0;
    let pendingNextLessonId = null;
    let waitingForContinue = false;
    let requestInFlight = false;

    async function loadData() {
        const [lessonResp, exercisesResp] = await Promise.all([
            fetch(`/api/lessons/${lessonId}`),
            fetch(`/api/exercises?lessonId=${lessonId}`)
        ]);

        if (!lessonResp.ok || !exercisesResp.ok) {
            throw new Error("Tundi ei saanud laadida");
        }

        lesson = await lessonResp.json();
        exercises = await exercisesResp.json();
        totalExercises = exercises.length;
        lessonTitleEl.textContent = lesson.title;
        lessonDescriptionEl.textContent = lesson.description || "";

        if (lesson.locked) {
            questionCardEl.classList.remove("hidden");
            questionTitleEl.textContent = "See tund on lukus. Lõpeta enne eelmine tund.";
            answersEl.innerHTML = "";
            nextBtnEl.classList.add("hidden");
            return;
        }

        renderCurrentExercise();
    }

    function renderCurrentExercise() {
        if (currentIndex >= exercises.length) {
            renderCompletion();
            return;
        }

        const exercise = exercises[currentIndex];
        selectedAnswer = "";
        feedbackEl.textContent = "";
        feedbackEl.className = "feedback";
        progressTextEl.textContent = `Küsimus ${currentIndex + 1}/${exercises.length}`;
        scoreTextEl.textContent = `Tulemus: ${score}/${Math.max(totalExercises, 1)}`;
        questionTitleEl.textContent = exercise.question;
        answersEl.innerHTML = "";
        questionCardEl.classList.remove("hidden");
        doneCardEl.classList.add("hidden");
        nextBtnEl.classList.remove("hidden");
        nextBtnEl.disabled = false;
        nextBtnEl.textContent = "Kontrolli";
        waitingForContinue = false;

        if (exercise.type === "MULTIPLE_CHOICE") {
            const opts = Array.isArray(exercise.options) ? exercise.options : [];
            opts.forEach((option) => {
                const optionBtn = document.createElement("button");
                optionBtn.type = "button";
                optionBtn.className = "option-btn";
                optionBtn.textContent = option;
                optionBtn.addEventListener("click", () => {
                    selectedAnswer = option;
                    [...answersEl.querySelectorAll(".option-btn")].forEach((btn) => btn.classList.remove("selected"));
                    optionBtn.classList.add("selected");
                });
                answersEl.appendChild(optionBtn);
            });
        } else {
            const input = document.createElement("input");
            input.type = "text";
            input.placeholder = "Kirjuta oma vastus…";
            input.addEventListener("input", (event) => {
                selectedAnswer = event.target.value;
            });
            answersEl.appendChild(input);
        }
    }

    async function handleNext() {
        if (requestInFlight) {
            return;
        }
        if (waitingForContinue) {
            currentIndex += 1;
            renderCurrentExercise();
            return;
        }
        // Do not block answering: server "lessonCompleted" can be true while this session still shows remaining steps.
        if (lessonCompleted && currentIndex >= exercises.length) {
            return;
        }
        if (!selectedAnswer || !selectedAnswer.trim()) {
            feedbackEl.textContent = "Enne jätkamist vali või kirjuta vastus.";
            feedbackEl.className = "feedback bad";
            return;
        }

        requestInFlight = true;
        nextBtnEl.disabled = true;
        try {
            const exercise = exercises[currentIndex];
            const response = await fetch("/api/attempts", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    [csrfHeader]: csrfToken
                },
                body: JSON.stringify({
                    lessonId: lessonId,
                    exerciseId: exercise.id,
                    userAnswer: selectedAnswer
                })
            });

            if (!response.ok) {
                const errText = await response.text();
                feedbackEl.textContent =
                    errText && errText.trim()
                        ? errText.trim()
                        : "Vastust ei salvestatud. Proovi uuesti.";
                feedbackEl.className = "feedback bad";
                return;
            }

            const result = await response.json();
            score = result.score;
            totalExercises = result.totalExercises;
            pendingNextLessonId = result.nextLessonId;
            lessonCompleted = result.lessonCompleted;

            if (result.correct) {
                feedbackEl.textContent = "Õige!";
                feedbackEl.className = "feedback ok";
            } else {
                feedbackEl.textContent = `Vale. Õige vastus: ${result.correctAnswer}`;
                feedbackEl.className = "feedback bad";
            }

            scoreTextEl.textContent = `Tulemus: ${score}/${Math.max(totalExercises, 1)}`;
            waitingForContinue = true;
            nextBtnEl.textContent = "Jätka";
            [...answersEl.querySelectorAll("button,input")].forEach((el) => {
                el.disabled = true;
            });
        } catch (e) {
            feedbackEl.textContent = "Võrgu viga. Kontrolli ühendust ja proovi uuesti.";
            feedbackEl.className = "feedback bad";
        } finally {
            requestInFlight = false;
            nextBtnEl.disabled = false;
        }
    }

    function renderCompletion() {
        questionCardEl.classList.add("hidden");
        doneCardEl.classList.remove("hidden");
        finalScoreEl.textContent = `Lõpptulemus: ${score}/${Math.max(totalExercises, exercises.length)} õigesti`;
        scoreTextEl.textContent = `Tulemus: ${score}/${Math.max(totalExercises, exercises.length)}`;

        if (pendingNextLessonId) {
            nextLessonLinkEl.href = `/learn/${pendingNextLessonId}`;
            nextLessonLinkEl.classList.remove("hidden");
        } else {
            nextLessonLinkEl.classList.add("hidden");
        }
    }

    nextBtnEl.addEventListener("click", handleNext);

    loadData().catch(() => {
        lessonTitleEl.textContent = "Tundi ei saanud laadida";
        lessonDescriptionEl.textContent = "Mine tagasi ja proovi uuesti.";
    });
</script>
</body>
</html>
