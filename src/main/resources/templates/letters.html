<!DOCTYPE html>
<html lang="et" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MariEst — mäemari/niidumari tähestik algajatele." />
    <title>MariEst — Tähed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #0f171d;
            --panel: #182229;
            --text: #f5f7fb;
            --muted: #9fb0bd;
            --green: #7ad400;
            --blue: #6eb7ff;
            --yellow: #ffd84d;
            --border: 1px solid rgba(255,255,255,.08);
            --shadow: 0 16px 40px rgba(0,0,0,.35);
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            min-height: 100%;
            background: radial-gradient(circle at top, #16222a 0%, var(--bg) 60%);
            color: var(--text);
            font-family: Inter, system-ui, sans-serif;
        }
        .wrap { width: min(1080px, 100%); margin: 0 auto; padding: 20px; }
        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .brand {
            text-decoration: none;
            color: var(--green);
            font-weight: 900;
            font-size: 30px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .brand img { width: 34px; height: 34px; object-fit: contain; }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border-radius: 14px;
            padding: 10px 14px;
            font-weight: 800;
            border: var(--border);
            color: var(--text);
            background: rgba(255,255,255,.05);
        }
        .btn-primary {
            border: none;
            background: linear-gradient(135deg, #7ad400 0%, #5fb500 100%);
            color: #fff;
        }
        .hero {
            background: rgba(16, 23, 28, .82);
            border: var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 20px;
            margin-bottom: 14px;
        }
        .hero h1 { margin: 6px 0 8px; font-size: clamp(24px, 4vw, 40px); }
        .hero p { margin: 0; color: var(--muted); line-height: 1.55; max-width: 70ch; }
        .alphabet {
            background: rgba(16, 23, 28, .82);
            border: var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 18px;
        }
        .alphabet-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .alphabet-head h2 { margin: 0; font-size: 20px; }
        .alphabet-head small { color: var(--muted); font-weight: 700; }
        .search {
            width: 100%;
            border: 1px solid rgba(255,255,255,.12);
            background: rgba(255,255,255,.04);
            color: var(--text);
            border-radius: 14px;
            padding: 12px 14px;
            font: inherit;
            margin-bottom: 12px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 10px;
        }
        .letter {
            min-height: 82px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,.16);
            background: linear-gradient(180deg, #9cff28, #71d400);
            box-shadow: inset 0 -4px 0 rgba(0,0,0,.14), 0 12px 22px rgba(122,212,0,.16);
            display: grid;
            place-items: center;
            text-align: center;
            line-height: 1.2;
            padding: 8px 4px;
            cursor: pointer;
            transition: transform .12s ease, border-color .12s ease, background .12s ease;
        }
        .letter:hover {
            transform: translateY(-2px);
            border-color: rgba(255,255,255,.24);
            background: linear-gradient(180deg, #a8ff3a, #7ad400);
        }
        .letter strong { display: block; font-size: 30px; font-weight: 900; }
        .letter span { color: rgba(20,33,9,.72); font-size: 13px; font-weight: 800; }
        .legend {
            margin-top: 12px;
            color: var(--muted);
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            font-size: 13px;
            font-weight: 700;
        }
        .dot { width: 11px; height: 11px; border-radius: 999px; display: inline-block; margin-right: 6px; vertical-align: -1px; }
        .d1 { background: #687983; }
        @media (max-width: 900px) { .grid { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
    </style>
</head>
<body>
<div class="wrap">
    <header class="top">
        <a class="brand" th:href="@{/}">
            MariEst
            <img src="/images/Squirrel.png" width="34" height="34" alt="" aria-hidden="true" />
        </a>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <a class="btn" th:href="@{/learn}">Õpperada</a>
            <a class="btn btn-primary" th:href="@{/sections}">Peatükid</a>
        </div>
    </header>

    <section class="hero">
        <div style="font-weight:800; color:#d8ff95;">Салам · Tere!</div>
        <h1>Mari tähestik</h1>
        <p>Lihtne mari tähestiku vaade: üks stiil, üks värv, ainult tähed ja häälikud.</p>
    </section>

    <section class="alphabet">
        <div class="alphabet-head">
            <h2>Tähekaardid (niidumari)</h2>
            <small>36 tähte</small>
        </div>
        <input id="search" class="search" type="text" placeholder="Otsi tähte või häälikut, nt: Ӱ, ja, ng" />
        <div id="grid" class="grid" aria-label="Mari tähestik"></div>
        <div class="legend">
            <div><span class="dot d1"></span>ühtne stiil kõigile tähtedele</div>
        </div>
    </section>
</div>

<script>
    const letters = [
        { letter: "А а", sound: "a" },
        { letter: "Б б", sound: "b" },
        { letter: "В в", sound: "v" },
        { letter: "Г г", sound: "g" },
        { letter: "Д д", sound: "d" },
        { letter: "Е е", sound: "je" },
        { letter: "Ё ё", sound: "jo" },
        { letter: "Ж ж", sound: "ž" },
        { letter: "З з", sound: "z" },
        { letter: "И и", sound: "i" },
        { letter: "Й й", sound: "j" },
        { letter: "К к", sound: "k" },
        { letter: "Л л", sound: "l" },
        { letter: "М м", sound: "m" },
        { letter: "Н н", sound: "n" },
        { letter: "Ҥ ҥ", sound: "ng" },
        { letter: "О о", sound: "o" },
        { letter: "Ӧ ӧ", sound: "ö" },
        { letter: "П п", sound: "p" },
        { letter: "Р р", sound: "r" },
        { letter: "С с", sound: "s" },
        { letter: "Т т", sound: "t" },
        { letter: "У у", sound: "u" },
        { letter: "Ӱ ӱ", sound: "ü" },
        { letter: "Ф ф", sound: "f" },
        { letter: "Х х", sound: "h" },
        { letter: "Ц ц", sound: "ts" },
        { letter: "Ч ч", sound: "tš" },
        { letter: "Ш ш", sound: "š" },
        { letter: "Щ щ", sound: "štš" },
        { letter: "Ъ ъ", sound: "kõva märk" },
        { letter: "Ы ы", sound: "õ" },
        { letter: "Ь ь", sound: "pehme märk" },
        { letter: "Э э", sound: "e" },
        { letter: "Ю ю", sound: "ju" },
        { letter: "Я я", sound: "ja" }
    ];

    const grid = document.getElementById("grid");
    const search = document.getElementById("search");

    function render(query = "") {
        const q = query.trim().toLowerCase();
        grid.innerHTML = "";
        letters
            .filter((item) => !q || item.letter.toLowerCase().includes(q) || item.sound.toLowerCase().includes(q))
            .forEach((item) => {
                const card = document.createElement("button");
                card.type = "button";
                card.className = "letter";
                card.innerHTML = "<strong>" + item.letter + "</strong><span>" + item.sound + "</span>";
                grid.appendChild(card);
            });
    }

    search.addEventListener("input", () => render(search.value));
    render();
</script>
</body>
</html>
