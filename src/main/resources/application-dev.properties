# Kohalik käivitus ilma PostgreSQL-ita (H2 mälus).
# Käivita: --spring.profiles.active=dev   või   keskkonna muutuja SPRING_PROFILES_ACTIVE=dev

spring.datasource.url=jdbc:h2:mem:mariest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false
