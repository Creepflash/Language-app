spring.application.name=language-app

# Vaikimisi: PostgreSQL. Kui localhost:5432 ei vasta, käivita profiiliga "dev" (H2, vt application-dev.properties).
# PostgreSQL: loo DB ja kasutaja (vt allpool), seejärel käivita ilma profiilita või activeProfiles=default.

# PostgreSQL (loo DB: CREATE DATABASE mariest;)
spring.datasource.url=jdbc:postgresql://localhost:5432/mariest
spring.datasource.username=mariest
spring.datasource.password=mariest

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
